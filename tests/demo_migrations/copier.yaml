_templates_suffix: .tmpl
_envops:
  autoescape: false
  block_end_string: "%]"
  block_start_string: "[%"
  comment_end_string: "#]"
  comment_start_string: "[#"
  keep_trailing_newline: true
  variable_end_string: "]]"
  variable_start_string: "[["

_exclude:
  - tasks.py
  - migrations.py
  - .git

_tasks:
  - "python [[ _copier_conf.src_path / 'tasks.py' ]] 1"
  - [python, "[[ _copier_conf.src_path / 'tasks.py' ]]", "2"]

_migrations:
  - ["[[ _copier_conf.src_path / 'migrations.py' ]]", "[[ _copier_conf|to_json ]]"]
  # This migration is never executed because it's the 1st version copied, and
  # migrations are only executed when updating
  - version: v1.0.0
    command: "false"
  - version: v2
    command: "rm delete-in-migration-$VERSION_CURRENT.txt"
  - command: "mkdir hello"
    when: "[[ _stage == 'before' ]]"
  - command: "touch world"
    working_directory: "hello"
  - command: "touch world2"
    working_directory: "[[ _copier_conf.dst_path ]]/hello"

